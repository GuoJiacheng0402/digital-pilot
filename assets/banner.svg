<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="220" viewBox="0 0 1000 220" role="img" aria-label="DigitalPilot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#15233b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <style>
      .wm   { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-weight: 700; }
      .tag  { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-weight: 400; }
      .mono { font-family: "SFMono-Regular", "JetBrains Mono", Consolas, monospace; font-weight: 500; }
    </style>
  </defs>

  <rect width="1000" height="220" rx="16" fill="url(#bg)"/>
  <rect x="0" y="0" width="6" height="220" fill="url(#accent)"/>

  <!-- digital motif: clock waveform + standard-cell rows / GDS grid -->
  <g stroke="url(#accent)" stroke-width="2.5" fill="none" opacity="0.30">
    <!-- clock square wave -->
    <path d="M600 70 h26 v-26 h30 v26 h30 v-26 h30 v26 h30 v-26 h30 v26 h26"/>
    <!-- stdcell rows (placement) -->
    <g stroke-width="1.6" opacity="0.85">
      <rect x="620" y="100" width="44" height="22"/>
      <rect x="668" y="100" width="26" height="22"/>
      <rect x="698" y="100" width="58" height="22"/>
      <rect x="760" y="100" width="34" height="22"/>
      <rect x="620" y="128" width="30" height="22"/>
      <rect x="654" y="128" width="52" height="22"/>
      <rect x="710" y="128" width="24" height="22"/>
      <rect x="738" y="128" width="56" height="22"/>
    </g>
    <!-- routing + vias -->
    <path d="M812 56 V164 M850 56 V164 M888 56 V164 M926 56 V164" stroke-width="2"/>
    <path d="M800 88 H940 M800 132 H940" stroke-width="2"/>
    <circle cx="850" cy="88" r="4" fill="url(#accent)" stroke="none"/>
    <circle cx="888" cy="132" r="4" fill="url(#accent)" stroke="none"/>
    <circle cx="926" cy="88" r="4" fill="url(#accent)" stroke="none"/>
    <!-- flow arrow under cells -->
    <path d="M620 172 H790 m-10 -6 l10 6 l-10 6" stroke-width="2"/>
  </g>

  <text x="60" y="104" class="wm" font-size="58" fill="#f8fafc">Digital<tspan fill="url(#accent)">Pilot</tspan></text>
  <text x="62" y="146" class="tag" font-size="22" fill="#cbd5e1">AI 智能体驱动的数字 IC 课程设计全流程(RTL → GDS 签核)</text>
  <text x="62" y="178" class="mono" font-size="15" fill="#64748b">VCS · DC · Formality · Innovus · Calibre · StarRC · PrimeTime — sim → syn → APR → DRC/LVS → 3-corner signoff → GLS</text>
</svg>
